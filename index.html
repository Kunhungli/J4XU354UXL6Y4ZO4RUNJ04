<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>治療師自費計算</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <div class="badge" onclick="openRateDialog();">Fee Calculation</div>
      <h1>治療師自費計算</h1>
      <div class="subtitle">Therapist · Private Session Summary</div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Column headers -->
      <div class="col-headers">
        <div class="blank"></div>
        <div class="col-group 班內">
          <div class="col-group-label">班　內</div>
          <div class="col-sub-row">
            <div class="col-sub">次數</div>
            <div class="col-sub">薪水</div>
          </div>
        </div>
        <div class="col-group 班外">
          <div class="col-group-label">班　外</div>
          <div class="col-sub-row">
            <div class="col-sub">次數</div>
            <div class="col-sub">薪水</div>
          </div>
        </div>
      </div>

      <!-- 半小時 -->
      <div class="data-row">
        <div class="row-label">半小時</div>
        <div class="cell input-cell">
          <input type="number" id="h_in" value="" min="0" oninput="calc()" />
        </div>
        <div class="cell salary" id="h_in_sal">0</div>
        <div class="cell input-cell">
          <input type="number" id="h_out" value="" min="0" oninput="calc()" />
        </div>
        <div class="cell salary-out" id="h_out_sal">0</div>
      </div>

      <!-- 一小時 -->
      <div class="data-row">
        <div class="row-label">一小時</div>
        <div class="cell input-cell">
          <input type="number" id="f_in" value="" min="0" oninput="calc()" />
        </div>
        <div class="cell salary" id="f_in_sal">0</div>
        <div class="cell input-cell">
          <input type="number" id="f_out" value="" min="0" oninput="calc()" />
        </div>
        <div class="cell salary-out" id="f_out_sal">0</div>
      </div>

      <!-- 小計 -->
      <div class="subtotal-row">
        <div class="row-label">小　計</div>
        <div class="subtotal-cell 班內" id="sub_in">0</div>
        <div class="subtotal-cell 班外" id="sub_out">0</div>
      </div>

      <!-- 總計 -->
      <div class="total-section">
        <div class="total-label">總　計</div>
        <div class="total-value" id="total">0</div>
        <div class="total-unit">NTD</div>
      </div>

    </div>

    <div class="footer">Generated · 2026 &nbsp;/&nbsp; Private Use Only</div>
  </div>

 <dialog id="myDialog">
  <p id="dialogTitle" class="header">請輸入費率</p>
  <div class="rate-table">
    <div class="rate-header-row">
      <div class="rate-cell blank"></div>
      <div class="rate-cell col-group-label 班內">班　內</div>
      <div class="rate-cell col-group-label 班外">班　外</div>
    </div>
    <div class="rate-data-row">
      <div class="rate-cell label">半小時</div>
      <div class="rate-cell input-wrap">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="rate_h_in" placeholder="0"/>
      </div>
      <div class="rate-cell input-wrap">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="rate_h_out" placeholder="0"/>
      </div>
    </div>
    <div class="rate-data-row">
      <div class="rate-cell label">一小時</div>
      <div class="rate-cell input-wrap">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="rate_f_in" placeholder="0"/>
      </div>
      <div class="rate-cell input-wrap">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="rate_f_out" placeholder="0"/>
      </div>
    </div>
  </div>
  <div class="rate-actions">
    <button class="btn-clear" onclick="clearRates()">清除</button>
    <button class="btn-confirm" onclick="confirmRates()">確定</button>
  </div>
</dialog>

</body>

</html>
